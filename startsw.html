<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars - Galería de personajes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen overflow-x-hidden bg-gradient-to-br from-blue-950 via-blue-900 to-purple-950 font-sans text-slate-900">

    <!-- Cabecera: contiene navegación principal, autoplay y enlaces externos. -->
    <header class="sticky top-0 z-50 bg-gradient-to-r from-blue-900 via-purple-900 to-purple-950 shadow-xl">
        <nav class="flex flex-col items-center justify-center gap-3 px-4 py-4 text-center lg:flex-row lg:justify-between lg:px-8">
            <div class="flex w-full items-center justify-center gap-3 lg:w-auto lg:justify-start">
                <button id="openSidebarBtn" aria-label="Abrir menú"
                    class="rounded-lg p-2 transition hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-yellow-200 lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

                <div>
                    <h1 class="text-2xl font-bold text-white sm:text-3xl">
                        Star Wars
                    </h1>
                    <p class="text-sm text-blue-100">
                        Galería de personajes de la saga
                    </p>
                </div>

                <button id="autoplayBtnMobileHeader" aria-label="Activar pase automático de personajes"
                    class="rounded-full bg-yellow-400 p-1 shadow-md transition-transform duration-200 hover:scale-110 md:hidden">
                    <svg id="autoplayIconMobileHeader" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"
                        class="h-8 w-8">
                        <circle cx="16" cy="16" r="15" fill="#facc15" stroke="#fef08a" stroke-width="2" />
                        <polygon id="playShapeMobileHeader" points="13,10 25,16 13,22" fill="#0f172a" />
                    </svg>
                </button>
            </div>

            <div class="flex flex-wrap items-center justify-center gap-2 lg:justify-end">
                <p class="hidden text-sm text-blue-100 md:block">
                    Universo Star Wars
                </p>

                <div class="hidden items-center gap-1 md:flex">
                    <span class="text-xs font-semibold uppercase text-blue-100">
                        Auto
                    </span>

                    <button id="autoplayBtn" aria-label="Activar pase automático de personajes"
                        class="rounded-full bg-yellow-400 p-1 shadow-md transition-transform duration-200 hover:scale-110">
                        <svg id="autoplayIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"
                            class="h-8 w-8">
                            <circle cx="16" cy="16" r="15" fill="#facc15" stroke="#fef08a" stroke-width="2" />
                            <polygon id="playShape" points="13,10 25,16 13,22" fill="#0f172a" />
                        </svg>
                    </button>
                </div>

                <a href="https://www.starwars.com/" target="_blank" rel="noopener"
                    class="min-w-[112px] rounded-lg border border-yellow-100/70 px-3 py-2 text-center text-xs font-semibold uppercase text-yellow-100 shadow-md transition-colors hover:bg-white/10 focus:ring-2 focus:ring-yellow-200 focus:ring-offset-2 focus:ring-offset-purple-950">
                    Star Wars
                </a>

                <a href="index.html"
                    class="min-w-[112px] rounded-lg bg-yellow-400 px-3 py-2 text-center text-xs font-semibold uppercase text-slate-900 shadow-md transition-colors hover:bg-yellow-300 focus:ring-2 focus:ring-yellow-200 focus:ring-offset-2 focus:ring-offset-purple-950">
                    Volver
                </a>
            </div>
        </nav>
    </header>

    <main class="bg-gradient-to-br from-blue-950 via-blue-900 to-purple-950 px-4 py-6">
        <section class="mx-auto grid w-full max-w-6xl gap-5 lg:grid-cols-[260px_1fr]">

            <!-- Sidebar: lista paginada, buscador y cambio entre todos/favoritos. -->
            <aside id="sidebarMenu"
                class="fixed left-0 top-0 z-50 flex h-full w-72 -translate-x-full flex-col overflow-hidden bg-gradient-to-b from-blue-900 via-purple-900 to-purple-950 p-5 text-white shadow-2xl transition-transform duration-300 lg:static lg:z-auto lg:h-[calc(100vh-170px)] lg:w-full lg:translate-x-0 lg:rounded-2xl lg:border lg:border-purple-200/25 lg:bg-purple-950/35 lg:shadow-xl lg:backdrop-blur">

                <button id="closeSidebarBtn" aria-label="Cerrar menú"
                    class="absolute right-4 top-4 rounded-lg p-2 hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-yellow-200 lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>

                <div class="shrink-0">
                    <h2 class="text-xl font-bold text-white">
                        Personajes
                    </h2>

                    <p class="mb-4 text-sm text-blue-100">
                        Selecciona un personaje.
                    </p>

                    <label for="searchInput" class="sr-only">Buscar personaje</label>
                    <input id="searchInput" type="search" placeholder="Buscar personaje"
                        class="mb-3 w-full rounded-lg border border-purple-200/30 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none placeholder:text-slate-400 focus:border-yellow-300 focus:ring-2 focus:ring-yellow-200">

                    <div class="mb-4 grid grid-cols-2 gap-2">
                        <button id="showAllBtn" type="button"
                            class="rounded-lg bg-yellow-400 px-3 py-2 text-xs font-bold uppercase text-slate-900 shadow-md transition hover:bg-yellow-300 focus:ring-2 focus:ring-yellow-200">
                            Todos
                        </button>

                        <button id="showFavoritesBtn" type="button"
                            class="rounded-lg bg-purple-700 px-3 py-2 text-xs font-bold uppercase text-white shadow-md transition hover:bg-purple-800 focus:ring-2 focus:ring-purple-300">
                            Favoritos
                        </button>
                    </div>
                </div>

                <ol id="sidebarList" class="min-h-0 flex-1 space-y-2 overflow-y-auto pr-2 text-sm text-blue-100">
                </ol>

                <div class="mt-4 flex shrink-0 items-center justify-between gap-2 border-t border-white/10 pt-4">
                    <button id="prevGroupBtn"
                        class="rounded-full bg-yellow-400 px-4 py-2 font-bold text-slate-900">
                        &larr;
                    </button>

                    <p id="groupInfo" class="text-xs font-bold text-white">
                        Grupo 1
                    </p>

                    <button id="nextGroupBtn"
                        class="rounded-full bg-yellow-400 px-4 py-2 font-bold text-slate-900">
                        &rarr;
                    </button>
                </div>
            </aside>

            <!-- Zona principal: botones de navegación, foto y ficha del personaje activo. -->
            <section class="flex flex-col gap-4">
                <div class="grid gap-3 rounded-2xl border border-purple-200/25 bg-purple-950/35 p-3 shadow-xl backdrop-blur sm:grid-cols-2">
                    <button id="prevBtn"
                        class="w-full rounded-lg bg-yellow-400 px-4 py-2 text-sm font-semibold uppercase text-slate-900 shadow-md transition-colors hover:bg-yellow-300 focus:ring-2 focus:ring-yellow-200">
                        &larr; Anterior
                    </button>

                    <button id="nextBtn"
                        class="w-full rounded-lg bg-yellow-400 px-4 py-2 text-sm font-semibold uppercase text-slate-900 shadow-md transition-colors hover:bg-yellow-300 focus:ring-2 focus:ring-yellow-200">
                        Siguiente &rarr;
                    </button>
                </div>

                <section class="rounded-2xl border border-purple-200/25 bg-white/95 p-4 shadow-xl sm:p-5">
                    <div
                        class="mb-4 flex flex-col gap-2 border-b border-slate-200 pb-3 sm:flex-row sm:items-end sm:justify-between">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-900">
                                Galería Star Wars
                            </h2>
                            <p class="text-sm text-slate-500">
                                Explora personajes, planetas y detalles de la saga.
                            </p>
                        </div>

                        <span
                            class="w-fit rounded-full bg-purple-100 px-3 py-2 text-xs font-bold uppercase text-purple-900">
                            Personajes
                        </span>
                    </div>

                    <div class="grid gap-5 lg:grid-cols-[minmax(260px,360px)_1fr]">
                        <figure
                            class="flex h-[420px] max-h-[52vh] items-center justify-center overflow-hidden rounded-2xl bg-slate-100 shadow-inner">
                            <img id="mainImage" src="./img/despegando.png" alt="Imagen de Star Wars"
                                class="h-full w-full object-contain">
                        </figure>

                        <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow">
                            <h3 id="imageTitle" class="mb-2 text-2xl font-bold text-blue-950">
                                Personaje de Star Wars
                            </h3>

                            <p id="imageDesc" class="mb-3 text-sm leading-6 text-slate-600">
                            </p>

                            <ul id="caracteristicasList"
                                class="mb-4 list-inside list-disc space-y-1.5 text-sm text-slate-700">
                            </ul>

                            <p
                                class="w-fit rounded-full bg-yellow-50 px-3 py-1.5 text-xs font-bold text-slate-900 shadow-sm">
                                Foto
                                <span id="currentIndex">1</span>
                                /
                                <span id="totalImages">16</span>
                            </p>

                            <button id="favoriteBtn"
                                class="mt-3 rounded-lg bg-purple-700 px-4 py-2 text-xs font-bold uppercase text-white shadow-md transition hover:bg-purple-800 focus:ring-2 focus:ring-purple-300">
                                Añadir a favoritos
                            </button>
                        </section>
                    </div>

                    <section class="hidden">
                        <!-- Se mantiene oculto para que el JS pueda reutilizarlo si se decide mostrar miniaturas. -->
                        <div id="thumbnails"
                            class="grid max-h-12 grid-cols-4 gap-1.5 overflow-y-auto rounded-lg bg-slate-100 p-1.5 shadow-inner sm:grid-cols-6 lg:max-h-14 xl:grid-cols-8">
                        </div>
                    </section>
                </section>
            </section>
        </section>
    </main>

    <script src="js/claseStart.js"></script>
    <script src="js/starts.js"></script>

</body>

</html>
